services:
  zoey-tracker:
    build: .
    image: zoey-tracker:local
    container_name: zoey-tracker
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      - DB_PATH=/data/zoey.db
      - TZ=Europe/Vienna
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8087:8000"
    read_only: true
    tmpfs:
      # Reasonable cap so a runaway process can't fill RAM via /tmp.
      - /tmp:size=32M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
          pids: 200
    networks:
      - zoey-net

networks:
  zoey-net:
    name: zoey-net
    driver: bridge
